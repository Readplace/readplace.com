name: Project Deployment

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string

jobs:
  deploy-staging:
    runs-on: rp-ubuntu-latest-8-cores
    environment: staging
    env:
      AWS_REGION: ap-southeast-2
      PULUMI_BACKEND_URL: s3://hutch-pulumi-state-572337278115-ap-southeast-2
      PULUMI_STACK: staging
      PULUMI_CONFIG_PASSPHRASE: ''
    steps:
      - name: Export all repository and environment secrets as env vars
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          DELIM="EOF_$(openssl rand -hex 16)"
          printf '%s' "$SECRETS_JSON" | jq -r --arg d "$DELIM" '
            to_entries[]
            | select(.key != "github_token")
            | "\(.key)<<\($d)\n\(.value)\n\($d)"
          ' >> "$GITHUB_ENV"

      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy ${{ inputs.project }} to staging
        run: pnpm nx run ${{ inputs.project }}:deploy-infra --parallel=3

      - name: Post-deploy staging
        run: pnpm nx run ${{ inputs.project }}:post-deploy

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-staging-results-${{ inputs.project }}
          path: projects/${{ inputs.project }}/test-results-staging/
          retention-days: 7

  deploy-prod:
    needs: [deploy-staging]
    runs-on: rp-ubuntu-latest-8-cores
    environment: prod
    env:
      AWS_REGION: ap-southeast-2
      PULUMI_BACKEND_URL: s3://hutch-pulumi-state-278728209435-ap-southeast-2
      PULUMI_STACK: prod
      PULUMI_CONFIG_PASSPHRASE: ''
    steps:
      - name: Export all repository and environment secrets as env vars
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          DELIM="EOF_$(openssl rand -hex 16)"
          printf '%s' "$SECRETS_JSON" | jq -r --arg d "$DELIM" '
            to_entries[]
            | select(.key != "github_token")
            | "\(.key)<<\($d)\n\(.value)\n\($d)"
          ' >> "$GITHUB_ENV"

      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy ${{ inputs.project }} to prod
        run: pnpm nx run ${{ inputs.project }}:deploy-infra --parallel=3

      - name: Post-deploy prod
        run: pnpm nx run ${{ inputs.project }}:post-deploy
