name: Stuck articles canary

# Read-only DDB scan against the prod articles table that fails the run with
# one node:test sub-test per article whose state machines never reached a
# terminal-good state AND whose `originalUrl` is still reachable on the
# public network. Rows whose URL no longer resolves (DNS failure, TCP refused,
# TLS handshake error, timeout) are filtered out before the report is written
# — those rows are not actionable, the origin is gone. A green run means
# there are no actionable stuck articles.
#
# Runs daily at 06:30 AEST (30 minutes after the tier-1 crawl-pipeline canary
# so the two prod-scan canaries don't contend) and on demand from the Actions
# UI.

on:
  schedule:
    - cron: '30 19 * * *'   # 06:30 AEST daily
  workflow_dispatch:

permissions:
  contents: read
  # `issues: write` is needed so the on-failure step can open or comment on
  # the @claude tracking issue when the scheduled run goes red. The actual
  # API call uses `secrets.PAT_TOKEN` (so the comment author_association is
  # OWNER and the listener's gate clears), but GitHub still requires the
  # workflow-level scope to be declared.
  issues: write

jobs:
  stuck-articles-canary:
    runs-on: ubuntu-latest
    # Bind to the prod environment so AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
    # resolve to the prod-scoped credentials — the canary scans the prod
    # articles table by name (DYNAMODB_ARTICLES_TABLE below).
    environment: prod
    timeout-minutes: 10
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-southeast-2
      DYNAMODB_ARTICLES_TABLE: hutch-articles-cda0a08
      READPLACE_ORIGIN: https://readplace.com
      # Read by check-stuck-articles.ts: when set, the canary writes a JSON
      # report of the stuck rows to this path before the failing sub-tests
      # run. The on-failure step below reads it to format the issue body.
      STUCK_ARTICLES_REPORT_PATH: ${{ github.workspace }}/.stuck-articles-report.json
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run stuck articles canary
        run: pnpm nx run @packages/check-stuck-articles:check-stuck-articles

      # ┌──────────────────────────────────────────────────────────────────┐
      # │ ON FAILURE: open or update an @claude tracking issue             │
      # │ Fires on any canary failure regardless of event source — the    │
      # │ workflow only triggers on `schedule` and `workflow_dispatch`     │
      # │ anyway, and the operator should be able to exercise the full    │
      # │ Claude-handoff flow on demand (validate the wiring without      │
      # │ waiting 24h, replay a fix after an inconclusive cron, etc.).    │
      # └──────────────────────────────────────────────────────────────────┘
      - name: Open or update @claude issue on canary failure
        if: failure()
        uses: actions/github-script@v8
        with:
          # PAT_TOKEN ensures the comment/issue author_association is OWNER,
          # which is the gate claude-listener.yml checks before running.
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const reportPath = process.env.STUCK_ARTICLES_REPORT_PATH;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().slice(0, 10);
            const titlePrefix = `[Stuck articles canary ${today}]`;
            const marker = '<!-- CLAUDE_STUCK_ARTICLES_FIX -->';

            // The canary writes the report inside the failing test, so it
            // exists for "real" failures (≥1 stuck row). If it's missing,
            // the canary blew up earlier (e.g., MAX_PAGES assert, AWS auth)
            // — surface a generic body that points the listener at the run.
            let stuckList = '_(no report file produced — see workflow logs)_';
            let stuckCount = 0;
            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              stuckCount = report.stuck.length;
              if (stuckCount > 0) {
                stuckList = report.stuck
                  .map((row) => `- [${row.reasons.join(',')}] ${row.originalUrl} — ${row.terminalCheckMessage}; fetched: ${row.contentFetchedAt ?? '-'}; recrawl: ${row.recrawlUrl}`)
                  .join('\n');
              }
            }

            const body = [
              marker,
              '',
              '@claude The stuck-articles canary failed on its scheduled run. Use your Read tool to read `.github/workflows/stuck-articles-canary.md` for instructions.',
              '',
              '## Context',
              `- **Run**: ${runUrl}`,
              `- **Date (UTC)**: ${today}`,
              `- **Stuck rows**: ${stuckCount}`,
              '',
              '## Stuck rows',
              stuckList,
            ].join('\n');

            // Date-prefixed dedup: if today's issue already exists, append
            // a comment instead of opening a duplicate. With one cron a day
            // this is mostly defensive — but it covers retries (someone
            // adds a second cron line, GitHub fires the schedule twice) and
            // keeps each day's failures consolidated on a single tracking
            // issue.
            const search = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue is:open in:title "${titlePrefix}"`,
            });

            if (search.data.total_count > 0) {
              const issueNumber = search.data.items[0].number;
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body,
              });
              console.log(`Appended comment to existing issue #${issueNumber}`);
              return;
            }

            const title = `${titlePrefix} ${stuckCount} stuck article(s)`;
            const created = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
            });
            console.log(`Created issue #${created.data.number}: ${title}`);
