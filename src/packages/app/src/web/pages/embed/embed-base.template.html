<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <meta name="description" content="{{description}}">
  <meta name="robots" content="{{robots}}">
  <link rel="canonical" href="{{canonicalUrl}}">
  <meta name="theme-color" content="#2B3A55">
  <link rel="icon" type="image/svg+xml" href="/embed/icon.svg">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Readplace">
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{description}}">
  <meta property="og:url" content="{{canonicalUrl}}">
  <style>{{{baseStyles}}}</style>
  <style>{{{pageStyles}}}</style>
</head>
<body class="{{bodyClass}}">
  <header class="embed-site-header">
    <div class="embed-site-header__inner">
      <a class="embed-site-header__brand" href="{{appOrigin}}">
        <span class="embed-site-header__brand-mark">&amp;</span> Readplace
      </a>
      <span class="embed-site-header__tag">Embed kit</span>
    </div>
  </header>
  {{{content}}}
  {{{scripts}}}
</body>
</html>
