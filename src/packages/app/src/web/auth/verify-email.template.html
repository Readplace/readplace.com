    <main class="auth-page">
      <div class="auth-card">
        {{#if success}}
        <h1 class="auth-card__title">Email verified</h1>
        <p class="auth-card__subtitle">Your email has been verified. You can now use your account.</p>
        <a class="auth-form__submit" href="/queue">Go to your queue</a>
        {{else}}
        <h1 class="auth-card__title">Verification failed</h1>
        <p class="auth-card__subtitle">{{error}}</p>
        <a class="auth-form__submit" href="/login">Go to login</a>
        {{/if}}
      </div>
    </main>
