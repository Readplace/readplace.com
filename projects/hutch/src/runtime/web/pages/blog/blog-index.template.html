<main class="blog">
  <div class="blog__container">
    <h1 class="blog__title">Blog</h1>
    <p class="blog__subtitle">Thoughts on reading, building software, and the tools I use.</p>
    <div class="blog__list">
      {{#each posts}}
      <article class="blog-card">
        <a href="/blog/{{this.slug}}" class="blog-card__link">
          <h2 class="blog-card__title">{{this.title}}</h2>
          <time class="blog-card__date" datetime="{{this.date}}">{{this.formattedDate}}</time>
          <p class="blog-card__description">{{this.description}}</p>
        </a>
      </article>
      {{/each}}
    </div>
  </div>
</main>
