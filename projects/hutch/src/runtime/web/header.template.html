  <header class="header{{#if transparent}} header--transparent{{/if}}">
    <div class="header__content">
      <a href="/" class="header__brand">Read<span class="header__brand-mark">place</span></a>
      {{#if trial}}
      <p class="trial-countdown trial-countdown--{{trialEscalationClass}}"
         data-trial-ends-at-iso="{{trialEndsAtIso}}"
         data-server-now-iso="{{serverNowIso}}"
         data-trial-state="{{trialState}}"
         role="timer"
         aria-live="off"
         aria-atomic="true"
         data-test-trial-countdown>{{trialDisplayText}}</p>
      {{/if}}
      <nav class="nav">
        <button class="nav__toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-menu">
          <span class="nav__toggle-bar"></span>
          <span class="nav__toggle-bar"></span>
          <span class="nav__toggle-bar"></span>
        </button>
        <div id="nav-menu" class="nav__menu">
          <ul class="nav__list" data-test-nav-variant="{{#if isAuthenticated}}authenticated{{else}}guest{{/if}}">
            {{#if isAuthenticated}}
            <li><a href="/queue" class="nav__link" data-test-nav-item="queue">Queue</a></li>
            <li><a href="/import?utm_source=header-nav&amp;utm_medium=internal&amp;utm_content=import-link" class="nav__link" data-test-nav-item="import">Import Links</a></li>
            <li><a href="/export" class="nav__link" data-test-nav-item="export">Export</a></li>
            <li><a href="/account" class="nav__link" data-test-nav-item="account">Account</a></li>
            <li>
              <form method="POST" action="/logout">
                <button type="submit" class="nav__link" data-test-nav-item="logout">Sign out</button>
              </form>
            </li>
            {{else}}
            <li><a href="/#what-works" class="nav__link" data-test-nav-item="features">Features</a></li>
            <li><a href="/signup" class="nav__link" data-test-nav-item="signup">Sign up</a></li>
            {{/if}}
          </ul>
        </div>
      </nav>
    </div>
  </header>
