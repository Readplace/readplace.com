  <header class="header{{#if transparent}} header--transparent{{/if}}">
    <div class="header__content">
      <a href="/" class="header__brand">Read<span class="header__brand-mark">place</span></a>
      {{#if trial}}
      <a class="trial-countdown trial-countdown--{{trialEscalationClass}}"
         href="/account"
         data-trial-ends-at-iso="{{trialEndsAtIso}}"
         data-server-now-iso="{{serverNowIso}}"
         data-trial-state="{{trialState}}"
         role="timer"
         aria-live="off"
         aria-atomic="true"
         data-test-trial-countdown>{{trialDisplayText}}</a>
      {{/if}}
      <nav class="nav">
        <button class="nav__toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-menu">
          <span class="nav__toggle-bar"></span>
          <span class="nav__toggle-bar"></span>
          <span class="nav__toggle-bar"></span>
        </button>
        <div id="nav-menu" class="nav__menu">
          <ul class="nav__list" data-test-nav-variant="{{navVariant}}">
            {{#each navItems}}
            <li>
              <form method="{{method}}" action="{{href}}">
                <button type="submit" class="nav__link" data-test-nav-item="{{key}}">{{label}}</button>
              </form>
            </li>
            {{/each}}
          </ul>
        </div>
      </nav>
    </div>
  </header>
