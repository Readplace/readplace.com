    {{{headerHtml}}}
    {{{progressBarHtml}}}
    {{{summarySlotHtml}}}
    {{#if audioEnabled}}<div class="article-body__audio-slot article-body__audio-slot--visible" data-test-audio-player><div class="article-body__audio-player">
      <audio controls preload="metadata" src="{{staticBaseUrl}}/sample-audio.opus" data-audio-element></audio>
    </div></div>{{else}}<div class="article-body__audio-slot article-body__audio-slot--hidden" data-test-audio-player></div>{{/if}}
    {{{readerSlotHtml}}}
    <div class="article-body__actions article-body__actions--bottom">
      {{#if backLink}}<div class="article-body__back-bottom-slot article-body__back-bottom-slot--visible" data-test-back-bottom-slot><a class="article-body__back-bottom" href="{{backLink.bottomHref}}" data-test-back-bottom-link>{{backLink.label}}</a></div>{{else}}<div class="article-body__back-bottom-slot article-body__back-bottom-slot--hidden" data-test-back-bottom-slot></div>{{/if}}
      {{#if bottomMarkReadAction}}<div class="article-body__mark-read-bottom-slot article-body__mark-read-bottom-slot--visible" data-test-mark-read-bottom-slot><form class="article-body__mark-read-bottom-form" method="POST" action="{{bottomMarkReadAction.postUrl}}" hx-boost="true" hx-target="main" hx-select="main" hx-swap="outerHTML show:none" data-test-mark-read-bottom-form>{{#each bottomMarkReadAction.fields}}<input type="hidden" name="{{name}}" value="{{value}}">{{/each}}<button class="article-body__mark-read-bottom" type="submit" data-test-mark-read-bottom-btn>{{bottomMarkReadAction.label}}</button></form></div>{{else}}<div class="article-body__mark-read-bottom-slot article-body__mark-read-bottom-slot--hidden" data-test-mark-read-bottom-slot></div>{{/if}}
    </div>
